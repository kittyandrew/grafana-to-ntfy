# Build the image first: nix build .#docker && docker load < result
# Update the tag below after version bumps in Cargo.toml.
services:
  api:
    container_name: grafana-to-ntfy
    image: grafana-to-ntfy:2026.3.15
    restart: always
    env_file:
      - .env
    # For testing:
    ports:
      - 8080:8080


name: lint

# @NOTE: Reusable workflow — invoked from ci.yml. Direct push/PR triggers were removed
#  to make ci.yml the single entrypoint, so lint and flake-checks share one parent run
#  instead of racing against build.yml via workflow_run.
on:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: cargo fmt
        run: nix develop -c cargo fmt --check

      - name: cargo clippy
        run: nix develop -c cargo clippy -- -D warnings

      - name: alejandra
        run: nix develop -c alejandra --check .

      - name: deadnix
        run: nix develop -c deadnix --fail --no-lambda-pattern-names .

name: nix flake checks

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      checks: ${{ steps.list.outputs.checks }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6 # 15.03.2026

      - name: Install Nix
        uses: cachix/install-nix-action@v31 # 15.03.2026

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v13 # 02.04.2026

      # @NOTE: Only discovers x86_64-linux checks. The flake also defines aarch64-linux checks,
      #  but CI runs on x86_64 runners and NixOS VM tests require KVM on the matching architecture.
      - name: Discover flake checks
        id: list
        run: echo "checks=$(nix flake show --json | jq -c '.checks["x86_64-linux"] | keys')" >> "$GITHUB_OUTPUT"

  check:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: ${{ fromJson(needs.discover.outputs.checks) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6 # 15.03.2026

      - name: Install Nix
        uses: cachix/install-nix-action@v31 # 15.03.2026
        with:
          enable_kvm: true

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v13 # 02.04.2026

      - name: Run ${{ matrix.check }}
        run: nix build .#checks.x86_64-linux.${{ matrix.check }} --print-build-logs --show-trace

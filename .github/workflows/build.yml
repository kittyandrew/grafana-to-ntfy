name: build and push to dockerhub

# @NOTE: Reusable workflow — invoked from ci.yml only after lint and flake-checks
#  succeed (via needs:), and only on master push (gated by ci.yml's `if:`).
on:
  workflow_call:

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6 # 15.03.2026

      - name: Extract version
        id: version
        run: echo "version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')" >> "$GITHUB_OUTPUT"

  # @NOTE: Builds Docker images natively on each architecture's runner. GitHub provides
  #  free arm64 runners (ubuntu-24.04-arm) for public repos, so no cross-compilation needed.
  push-arch:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
            nix-system: x86_64-linux
          - runner: ubuntu-24.04-arm
            arch: arm64
            nix-system: aarch64-linux
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Build Docker image
        run: nix build .#packages.${{ matrix.nix-system }}.docker

      - name: Load image
        run: docker load < result

      - name: Login to Docker Hub
        uses: docker/login-action@v4 # 02.04.2026
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag and push
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          DOCKER_IMAGE="${{ secrets.DOCKER_USERNAME }}/grafana-to-ntfy"
          docker tag "grafana-to-ntfy:${VERSION}" "${DOCKER_IMAGE}:${VERSION}-${{ matrix.arch }}"
          docker push "${DOCKER_IMAGE}:${VERSION}-${{ matrix.arch }}"

  manifest:
    needs: [prepare, push-arch]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4 # 02.04.2026
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create and push multi-arch manifests
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          DOCKER_IMAGE="${{ secrets.DOCKER_USERNAME }}/grafana-to-ntfy"
          for TAG in latest "${VERSION}" "sha-${SHORT_SHA}"; do
            # @NOTE: --amend allows re-runs to overwrite a locally cached manifest.
            docker manifest create --amend "${DOCKER_IMAGE}:${TAG}" \
              "${DOCKER_IMAGE}:${VERSION}-amd64" \
              "${DOCKER_IMAGE}:${VERSION}-arm64"
            docker manifest push "${DOCKER_IMAGE}:${TAG}"
          done

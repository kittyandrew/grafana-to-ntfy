name: Setup Nix
description: Install Nix and enable the magic Nix cache. Caller must run actions/checkout first — local composite actions can't bootstrap their own checkout.

inputs:
  enable-kvm:
    description: Set to 'true' for jobs that run NixOS VM tests.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Install Nix
      uses: cachix/install-nix-action@v31 # 15.03.2026
      with:
        enable_kvm: ${{ inputs.enable-kvm == 'true' }}

    - name: Cache Nix store
      uses: DeterminateSystems/magic-nix-cache-action@v13 # 02.04.2026
